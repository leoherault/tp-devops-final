---
- name: Installation du Node Exporter partout
  hosts: all_vms
  tasks:
    - name: Installer Node Exporter
      apt:
        name: prometheus-node-exporter
        state: present
        update_cache: yes

- name: Installation de Prometheus et Grafana
  hosts: monitoring
  tasks:
    - name: Installer les dépendances pour Grafana
      apt:
        name: ['apt-transport-https', 'software-properties-common', 'wget', 'gnupg']
        state: present

    - name: Ajouter la clé GPG de Grafana
      apt_key:
        url: https://apt.grafana.com/gpg.key
        state: present

    - name: Ajouter le dépôt Grafana
      apt_repository:
        repo: deb https://apt.grafana.com stable main
        state: present

    - name: Installer Prometheus et Grafana
      apt:
        name: ['prometheus', 'grafana']
        state: present
        update_cache: yes

    - name: Configurer Prometheus
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'node_exporter'
              static_configs:
                - targets: ['10.220.1.165:9100', '10.220.1.166:9100']

    - name: Redemarrer les services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - prometheus
        - grafana-server
        - prometheus-node-exporter
